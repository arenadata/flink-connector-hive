name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

env:
  MAVEN_ARGS: -B -V -e -ntp

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: arenadata
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: License check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn ${{ env.MAVEN_ARGS }} -DskipTests apache-rat:check

      - name: Maven deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn ${{ env.MAVEN_ARGS }} clean deploy -DskipTests
